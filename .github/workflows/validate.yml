name: validate

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: "Package ID (e.g., Microsoft.AzIPLogViewer)"
        required: true
        type: string
      version:
        description: "Package version (e.g., 1.0)"
        required: true
        type: string
  pull_request:
    paths:
      - "manifests/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      installers: ${{ steps.matrix.outputs.installers }}
    steps:
      - uses: actions/checkout@v6

      - name: Get changed manifests
        id: changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          files: "manifests/**/*.yaml"
          dir_names: true

      - name: Build matrix
        id: matrix
        shell: pwsh
        env:
          PACKAGE_ID: ${{ inputs.package_id }}
          VERSION: ${{ inputs.version }}
          CHANGED: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          Install-Module powershell-yaml -Force
          $packages = @(if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            "manifests/$($env:PACKAGE_ID.Substring(0,1).ToLower())/$($env:PACKAGE_ID -replace '\.', '/')/$($env:VERSION)"
          } else {
            $env:CHANGED -split '\s+' | Select-Object -Unique
          })

          $installers = $packages | ForEach-Object {
            $manifestPath = Get-ChildItem $_ -Filter *.installer.yaml
            $manifest = $manifestPath | Get-Content | ConvertFrom-Yaml
            $manifest.Installers | ForEach-Object {
              @{
                path = $manifestPath | Resolve-Path -Relative;
                arch = $_.Architecture;
                scope = $_.Scope ?? $manifest.Scope;
                type = $_.InstallerType ?? $manifest.InstallerType
              }
            }
          }
          "installers=$($installers | ConvertTo-Json -Compress -Depth 5 -AsArray)" >> $env:GITHUB_OUTPUT

  validate:
    needs: detect
    runs-on: ${{ matrix.installer.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        installer: ${{ fromJSON(needs.detect.outputs.installers) }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows/validate.ps1
            ${{ matrix.installer.path }}

      - name: Install Attack Surface Analyzer
        uses: pl4nty/dotnet-setup-tools@v1
        with:
          tools: Microsoft.CST.AttackSurfaceAnalyzer.CLI

      - name: Get image version
        id: image-version
        run: '"version=$env:ImageVersion" >> $env:GITHUB_OUTPUT'

      - name: Restore Attack Surface Analyzer database
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/asa.sqlite*
          key: asa-baseline-${{ runner.os }}-${{ runner.arch }}-${{ steps.image-version.outputs.version }}

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Validate
        id: validate
        continue-on-error: true
        run: ./.github/workflows/validate.ps1 -ManifestPath '${{ matrix.installer.path }}' -Arch '${{ matrix.installer.arch }}' -Scope '${{ matrix.installer.scope }}' -InstallerType '${{ matrix.installer.type }}'

      - name: Upload winget log
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}\artifacts\${{ steps.validate.outputs.artifact_name }}-winget.log
          archive: false

      - name: Upload installer log
        id: upload-log
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}\artifacts\${{ steps.validate.outputs.artifact_name }}-installer.log
          if-no-files-found: ignore
          archive: false

      - name: Upload installer logs
        if: steps.upload-log.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          # Somehow this can match multiple files
          path: ${{ runner.temp }}\artifacts\${{ steps.validate.outputs.artifact_name }}-installer.log
          if-no-files-found: ignore

      - name: Upload screenshot
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}\artifacts\${{ steps.validate.outputs.artifact_name }}.png
          if-no-files-found: ignore
          archive: false

      - name: Upload SARIF
        if: steps.validate.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}\artifacts\${{ steps.validate.outputs.artifact_name }}-asa.sarif
          archive: false
