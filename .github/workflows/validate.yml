name: validate

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID (e.g., Microsoft.AzIPLogViewer)'
        required: true
        type: string
      version:
        description: 'Package version (e.g., 1.0)'
        required: true
        type: string
      architecture:
        description: 'Installer architecture to test'
        required: false
        default: all
        type: choice
        options:
          - all
          - x86
          - x64
          - arm64
      prepare_arm64_baseline:
        description: 'Build the cached Windows 11 ARM64 baseline instead of validating'
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - 'manifests/**'
      - 'fonts/**'
  # schedule:
  #   # Daily run on main to populate the Attack Surface Analyzer baseline cache
  #   - cron: '0 0 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.architecture || 'all' }}
  cancel-in-progress: true

jobs:
  prepare:
    if: inputs.prepare_arm64_baseline
    uses: ./.github/workflows/prepare-validation-vm.yml

  detect:
    if: ${{ !inputs.prepare_arm64_baseline }}
    name: Detect
    runs-on: ubuntu-slim
    outputs:
      installers: ${{ steps.matrix.outputs.installers }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get changed manifests
        id: changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            manifests/**/*.yaml
            fonts/**/*.yaml
          dir_names: true
          json: true
          escape_json: false

      - name: Build matrix
        id: matrix
        shell: pwsh
        env:
          PACKAGE_ID: ${{ inputs.package_id || 'Microsoft.ConfigMgr.SupportCenter' }}
          VERSION: ${{ inputs.version || '5.2509.1065.1000' }}
          ARCHITECTURE: ${{ inputs.architecture }}
          CHANGED: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          Install-Module powershell-yaml -Force
          $packages = @(if ($env:GITHUB_EVENT_NAME -ne 'pull_request') {
            $relativePath = "$($env:PACKAGE_ID.Substring(0,1).ToLower())/$($env:PACKAGE_ID -replace '\.', '/')/$($env:VERSION)"
            if (Test-Path "fonts/$relativePath") { "fonts/$relativePath" } else { "manifests/$relativePath" }
          } else {
            $env:CHANGED | ConvertFrom-Json | Select-Object -Unique
          })

          $installers = $packages | ForEach-Object {
            $manifestPath = Get-ChildItem $_ -Filter *.installer.yaml
            $manifest = $manifestPath | Get-Content | ConvertFrom-Yaml
            $manifest.Installers | Where-Object {
              $env:ARCHITECTURE -in @('', 'all', $_.Architecture)
            } | ForEach-Object {
              @{
                path = $manifestPath | Resolve-Path -Relative;
                arch = $_.Architecture;
                scope = $_.Scope ?? $manifest.Scope;
                type = $_.InstallerType ?? $manifest.InstallerType
              }
            }
          }
          "installers=$($installers | ConvertTo-Json -Compress -Depth 5 -AsArray)" >> $env:GITHUB_OUTPUT

  validate:
    name: Installation Validation
    needs: detect
    if: ${{ !inputs.prepare_arm64_baseline }}
    runs-on: ${{ matrix.installer.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: ${{ matrix.installer.arch == 'arm64' && 20 || 60 }}
    strategy:
      fail-fast: false
      matrix:
        installer: ${{ fromJSON(needs.detect.outputs.installers) }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows/validate-vm.sh
            .github/workflows/validate-vm.Dockerfile
            .github/workflows/validate-bootstrap.ps1
            .github/workflows/install-validation-dependencies.ps1
            .github/workflows/validate.ps1
            .github/workflows/analyses.json
            ${{ matrix.installer.path }}

      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Restore ARM64 Windows baseline
        if: matrix.installer.arch == 'arm64'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/windows-arm64-baseline
          key: windows-11-ltsc-arm64-validation-v1
          fail-on-cache-miss: true

      - name: Free disk space for Windows VM
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/dotnet
          docker system prune --all --force

      - name: Validate
        id: validate
        shell: bash
        run: |
          bash ./.github/workflows/validate-vm.sh
        env:
          MANIFEST_PATH: ${{ matrix.installer.path }}
          ARCH: ${{ matrix.installer.arch }}
          SCOPE: ${{ matrix.installer.scope }}
          INSTALLER_TYPE: ${{ matrix.installer.type }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print logs
        if: always()
        working-directory: ${{ runner.temp }}/artifacts
        run: |
          Get-ChildItem "$env:STEPS_VALIDATE_OUTPUTS_ARTIFACT_NAME-*.log", "$env:STEPS_VALIDATE_OUTPUTS_ARTIFACT_NAME-installer.log" -Recurse -File | select -Unique | ForEach-Object {
            Write-Host "::group::$($_.Name)"
            Get-Content $_
            Write-Host "::endgroup::"
          }
        env:
          STEPS_VALIDATE_OUTPUTS_ARTIFACT_NAME: ${{ steps.validate.outputs.artifact_name }}

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.validate.outputs.artifact_name || format('validation-{0}', matrix.installer.arch) }}
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: error

      - name: Upload screenshot
        id: screenshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ runner.temp }}/artifacts/${{ steps.validate.outputs.artifact_name }}.png
          if-no-files-found: ignore
          archive: false

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.validate.outputs.artifact_name }}-asa
          path: ${{ runner.temp }}/artifacts/${{ steps.validate.outputs.artifact_name }}-asa.sarif
          if-no-files-found: ignore

      - name: Add validation logs to job summary
        if: always()
        env:
          ARTIFACT_NAME: ${{ steps.validate.outputs.artifact_name }}
          SCREENSHOT_URL: ${{ steps.screenshot.outputs.artifact-url }}
        run: |
          @(
            "## Validation logs: $env:ARTIFACT_NAME",
            ""
          ) >> $env:GITHUB_STEP_SUMMARY

          if ($env:SCREENSHOT_URL) {
            "[Screenshot artifact]($env:SCREENSHOT_URL)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }

          Get-ChildItem "$env:RUNNER_TEMP\artifacts\$env:ARTIFACT_NAME-*.log", "$env:RUNNER_TEMP\artifacts\$env:ARTIFACT_NAME-installer.log" -Recurse -File -ErrorAction SilentlyContinue | select -Unique | ForEach-Object {
            "<details><summary>$($_.Name)</summary>" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            '```text' >> $env:GITHUB_STEP_SUMMARY
            Get-Content $_ >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "</details>" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }
