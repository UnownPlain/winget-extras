name: Validate

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID'
        required: true
        default: Purslane.RustDesk
        type: string
      version:
        description: 'Package version'
        required: true
        default: 1.4.9
        type: string
  # schedule:
  #   # Daily run on main to populate the Attack Surface Analyzer baseline cache
  #   - cron: '0 0 * * *'

permissions: {}

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Installers
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get changed manifests
        id: changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            manifests/**/*.yaml
            fonts/**/*.yaml
          dir_names: true
          json: true
          escape_json: false

      - name: Build matrix
        id: matrix
        if: inputs.package_id != '' || steps.changed.outputs.any_changed == 'true'
        shell: pwsh
        env:
          PACKAGE_ID: ${{ inputs.package_id }}
          PACKAGE_VERSION: ${{ inputs.version }}
          CHANGED_DIRECTORIES: ${{ steps.changed.outputs.any_changed == 'true' && steps.changed.outputs.all_changed_files || '' }}
        run: |
          $matrix = ./scripts/ci/validation/build-matrix.ps1 `
            -ChangedDirectories $env:CHANGED_DIRECTORIES `
            -PackageId $env:PACKAGE_ID `
            -PackageVersion $env:PACKAGE_VERSION
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  validate:
    name: Validate ${{ matrix.artifact }}
    needs: detect
    if: needs.detect.outputs.matrix != ''
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    timeout-minutes: 20
    strategy:
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
      fail-fast: false
    env:
      MANIFEST_PATH: ${{ matrix.manifest }}
      ARTIFACT_NAME: ${{ matrix.artifact }}
      ARCHITECTURE: ${{ matrix.arch }}
      SCOPE: ${{ matrix.scope }}
      INSTALLER_TYPE: ${{ matrix.type }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            scripts/ci/validation
            ${{ matrix.manifest }}

      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate
        run: |
          ./scripts/ci/validation/validate.ps1 `
            -ManifestPath $env:MANIFEST_PATH `
            -ArtifactName $env:ARTIFACT_NAME `
            -Architecture $env:ARCHITECTURE `
            -Scope $env:SCOPE `
            -InstallerType $env:INSTALLER_TYPE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - parallel:
          - name: Upload screenshot
            id: screenshot
            if: always()
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
            with:
              name: ${{ matrix.artifact }}-screenshot
              path: ${{ runner.temp }}\artifacts\${{ matrix.artifact }}.png
              if-no-files-found: ignore
              archive: false

          - name: Upload SARIF
            if: always()
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
            with:
              name: ${{ matrix.artifact }}-asa
              path: ${{ runner.temp }}\artifacts\${{ matrix.artifact }}-asa.sarif
              if-no-files-found: ignore

          - name: Publish report
            if: always()
            env:
              SCREENSHOT_URL: ${{ steps.screenshot.outputs.artifact-url }}
            run: |
              ./scripts/ci/validation/publish-report.ps1 `
                -ArtifactName $env:ARTIFACT_NAME `
                -ScreenshotUrl $env:SCREENSHOT_URL
