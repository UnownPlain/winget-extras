name: label

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    paths: ['manifests/**', 'fonts/**']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label:
    name: Label
    permissions:
      pull-requests: write # For adding labels
    runs-on: ubuntu-slim
    steps:
      - uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed
        with:
          files: |
            manifests/**/*.installer.yaml
            fonts/**/*.installer.yaml
          json: true
          escape_json: false

      - name: Label arm32
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGED: ${{ steps.changed.outputs.all_changed_files }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          $archs = $env:CHANGED | ConvertFrom-Json | Where-Object { $_ } | ForEach-Object {
            $path = ($_ -split '/' | ForEach-Object { [uri]::EscapeDataString($_) }) -join '/'
            gh api --method GET "repos/$env:HEAD_REPOSITORY/contents/$path" `
              -f "ref=$env:HEAD_SHA" `
              -H 'Accept: application/vnd.github.raw+json' |
              yq '.Architecture, .Installers[].Architecture' -
          } | Select-Object -Unique
          if ($archs -contains 'arm') {
            gh pr edit $env:PR --add-label 'Validation-arm32' --repo $env:GITHUB_REPOSITORY
          }
