PackageName: .NET 런타임 8.0 (x86 런타임 안에 x64/ARM64)
PackageUrl: https://dotnet.microsoft.com/ko-kr/download/dotnet/8.0
ShortDescription: .NET 런타임에는 콘솔 앱을 실행하는 데 필요한 구성 요소만 포함되어 있습니다.
Description: |-
  .NET 런타임에는 콘솔 앱을 실행하는 데 필요한 구성 요소만 포함되어 있습니다.

  이 Winget 패키지는 x64(/ARM64) 런타임과 함께 x64/ARM64 Windows OS 버전에 x86 런타임을 설치해야 하는 사용자를 위한 것입니다. Windows 10 x86 OS를 사용하는 경우, 대신 일반 Microsoft.DotNet.Runtime.8 패키지를 사용하십시오.
