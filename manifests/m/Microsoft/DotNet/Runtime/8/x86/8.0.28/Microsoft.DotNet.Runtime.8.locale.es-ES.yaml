Description: |-
  El entorno de ejecución de .NET contiene solo los componentes necesarios para ejecutar una aplicación de consola.

  Este paquete de Winget está destinado a aquellos que necesiten instalar el tiempo de ejecución x86 en versiones del sistema operativo Windows x64/ARM64, junto con los tiempos de ejecución x64 (/ARM64). Si utilizas un sistema operativo Windows 10 x86, utiliza en su lugar el paquete habitual Microsoft.DotNet.Runtime.8.
