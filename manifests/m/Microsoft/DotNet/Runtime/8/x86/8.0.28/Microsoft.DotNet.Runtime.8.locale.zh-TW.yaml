Description: |-
  .NET 執行階段只包含執行主控台應用程式所需的元件。

  此 Winget 套件適用於需要在 x64/ARM64 版本的 Windows 作業系統上，同時安裝 x86 執行環境與 x64(/ARM64) 執行環境的使用者。若您使用的是 Windows 10 x86 作業系統，請改用標準的 Microsoft.DotNet.Runtime.8 套件。
