  Changelog
  Changelog

  Added
  - Support controller user attribution in audit logs #15407
  - Feature: Restore the last viewed monitor on auto reconnect #15441
  - auto-close terminal tab/window when shell exits #15448
  - Add authentication details to connection audit #15456

  Changes
  - refact: remove feature cli #15524

  Fixes
  - Fix/session scope permission audit #15469
  - fix: non-E2EE show dialog #15514
  - fix(wayland): clipboard, support ext-data-control #15366
  - refact: file transfer, do this for all conflicts(tasks) #15385
  - fix(clipboard): unix, refresh cached file size/mtime on re-copy #15392
  - fix(custom-client): show options, incoming-only #15394
  - fix(fuse): fuse path broken, since ipc path changed #15406
  - Tray menu opens on left-click after tray-icon ≥0.17 update (regression from 1.4.6) #15413
  - fix(android): sync input service state with Flutter #15419
  - fix(fuse): umount #15426
  - fix(update): msi, norestart #15440
  - fix(clipboard): make CLIPRDR format-map growth checked #15493
