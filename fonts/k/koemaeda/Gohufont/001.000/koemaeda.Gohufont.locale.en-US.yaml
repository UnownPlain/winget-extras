ShortDescription: Legible monospace bitmap font optimized for terminals and programming
Description: |-
  Gohufont is a monospace bitmap font designed for programming and terminal use.
  It emphasizes legibility and unambiguous glyphs: tall capitals and ascenders,
  crisp rounded forms with small serifs, a dashed zero, and clearly distinct
  characters such as l, I, and 1. Available in 11 px and 14 px sizes with
  both normal and bold variants, Gohufont provides broad Unicode/Latin-1 coverage
  and multiple downloadable formats for portability.
