ReleaseNotes: |-
  Monocraft now has font hinting! That means that rendering on Windows and Linux should be significantly sharper and cleaner, especially at lower resolutions (or in the terminal). I've also fixed the NerdFonts packaging as there were reported issues of icons being put in the wrong code points. Alongside those fixes, I've bundled the complete NerdFonts set so you should have access to more icons than ever before! Lastly, I've added the TODO: and NOTE: ligatures used in Miracode because I've found them to be quite useful.
  Please report if the type hinting improves or causes issues with rendering on Windows/Linux. I've done my best to test but I'd appreciate the feedback from other users as we all have different setups.
  Join the Discord to help out and get support! We always need more beta testers!
  Note: This build has been updated (and retagged to stop upsetting Homebrew) as the previous build contained some issues with incorrect PANOSE values causing the font to render incorrectly in Microsoft software such as VSCode. This has been resolved. Hopefully.

  What's Changed
  - Added TODO: ... and NOTE: ... ligatures
  - Fixed NerdFonts support (thanks @ryyHardy!)
  - Added complete NerdFonts icon set
  - Added build script to the repository
  - Updated builds to include different .ttf and .otf versions and weights
  - Customized PANOSE values so that Windows terminal recognizes the font as monospaced (thanks @PQL87!)
