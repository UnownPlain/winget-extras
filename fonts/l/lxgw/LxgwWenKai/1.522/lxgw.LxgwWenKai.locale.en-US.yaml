ShortDescription: An open-source Chinese typeface derived from Fontworks Klee One.
Description: LXGW WenKai is an open-source Chinese typeface derived from Fontworks' Klee One. The project describes it as a non-professional Chinese font and includes both WenKai and WenKai Mono styles.
