  - 调整上下标字母：ᴹᴺᴼᴾʰʲˡʳˢʷˣʸ
  - 新增上下标字母：ᴬᴮꟲᴰᴱꟳᴳᴴᴵᴶᴷᴸꟴᴿ꟱ᵀᵁⱽᵂᵃᵇᶜᵈᵉᶠᵍᵏᵐᵒᵖ𐞥ᵗᵘᵛᶻᵢⱼᵣᵤᵥ
  - 实验性新增 chws 和 vchw 特性，以在字体层面实现标点挤压。#178
  - 实验性新增破折号连接特性。
  - 等宽版移除 dlig 特性，以免影响编辑器中本字体的显示效果。
  - 将 openTypeVheaVertTypoAscender 和 openTypeVheaVertTypoDescender 值分别调整为 500 和 -500，以修复某些环境下竖排行距过宽的问题。#182
  - 调整以下谚文：호환효흐
  - 修复「䝉U+4749」误做成「𫎇U+2B387」的问题。
  - 按照西文字体设计惯例，调整「−U+2212」，与「+U+002B」同宽。
  - 调整「🄋U+1F10B」和「🄌U+1F10C」为无衬线样式。
  - 将与统一表意文字同形的部首区字形改为复合字形，便于后续优化汉字字形时部首区字形同步修改。
  - 将等宽字体的「⸺U+2E3A」「⸻U+2E3B」改为 1 EM 宽度，并在上方标注 (2M) 或 (3M)，以免 GNU/Linux 终端等应用无法识别等宽字体。在支持 ccmp 特性的环境下，可正常显示为 2 EM 或 3 EM 横线。
  - 将 Light 字重的部分符号字形替换为 Klee One Regular 原有字形。
  - 新增针对居中标点的 Unicode 变体序列（单击此处了解）。
  - 调整「↶U+21B6」和「↷U+21B7」的细节。
  - 重制以下特殊符号：⏾▣▤▥▦▧▨▩☯⚽✽（部分符号轮廓借用 IBM Plex Math）。
  - 修复 Light 字重「䁠」轮廓问题。
