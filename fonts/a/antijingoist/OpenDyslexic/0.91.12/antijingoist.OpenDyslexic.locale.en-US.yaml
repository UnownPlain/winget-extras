ShortDescription: OpenDyslexic is a typeface designed against some common symptoms of dyslexia.
Description: |-
  OpenDyslexic is a new open sourced font created to increase readability for readers with dyslexia.

  The typeface includes regular, bold, italic, and bold-italic styles, and 2 typefaces: OpenDyslexic, and OpenDyslexic-Alta.

  It was created to help with the creator's reading, and is being updated continually and improved based on input from other dyslexic users.

  There are no restrictions on using OpenDyslexic as it is created to help with some of the symptoms of dyslexia. Letters have heavy weighted bottoms to indicate direction. You are able to quickly figure out which part of the letter is down which aids in recognizing the correct letter, and sometimes helps to keep your brain from rotating them around. Consistently weighted bottoms can also help reinforce the line of text. The unique shapes of each letter can help prevent confusion through flipping and swapping.
